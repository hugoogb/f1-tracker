services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: f1tracker
      POSTGRES_USER: f1tracker
      POSTGRES_PASSWORD: f1tracker_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U f1tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
